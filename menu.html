<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upyard Rooftop Lounge - Menu</title>
  <style>
    body {
      background-color: #0b0b0b;
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: sans-serif;
    }
    .menu-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .menu-container img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .back-btn {
      display: inline-block;
      padding: 12px 24px;
      margin: 20px 0 40px;
      color: #0b0b0b;
      background: #c9a84c;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: #e5c56c;
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <a href="index.html" class="back-btn">← BACK TO HOME</a>
    
    <!-- Drinks -->
    <img src="assets/menu/d1.jpg" alt="Menu Drinks Page 1" loading="lazy">
    <img src="assets/menu/d2.jpg" alt="Menu Drinks Page 2" loading="lazy">
    <img src="assets/menu/d3.jpg" alt="Menu Drinks Page 3" loading="lazy">
    <img src="assets/menu/d4.jpg" alt="Menu Drinks Page 4" loading="lazy">
    <img src="assets/menu/d5.jpg" alt="Menu Drinks Page 5" loading="lazy">
    <img src="assets/menu/d6.jpg" alt="Menu Drinks Page 6" loading="lazy">
    
    <!-- Food -->
    <img src="assets/menu/f2.jpg" alt="Menu Food Page 1" loading="lazy">
    <img src="assets/menu/f3.jpg" alt="Menu Food Page 2" loading="lazy">
    <img src="assets/menu/f4.jpg" alt="Menu Food Page 3" loading="lazy">

    <a href="index.html" class="back-btn">← BACK TO HOME</a>
  </div>
</body>
</html>
